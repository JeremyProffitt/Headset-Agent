name: PR Validation

on:
  pull_request:
    branches:
      - main
      - 'release/*'

env:
  GO_VERSION: '1.23'
  PYTHON_VERSION: '3.11'

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Check Go formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Code is not formatted. Run 'gofmt -w .'"
            gofmt -d .
            exit 1
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          args: --timeout=5m

      - name: Verify go.mod
        run: |
          go mod tidy
          if [ -n "$(git status --porcelain go.mod go.sum)" ]; then
            echo "go.mod or go.sum is not tidy"
            exit 1
          fi

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests with coverage
        run: |
          go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
          go tool cover -func=coverage.out

      - name: Enforce coverage threshold (internal packages)
        run: |
          # Business logic lives in ./internal/...; cmd/* entrypoints are covered
          # by the post-deploy smoke + integration tests, not unit tests, so they
          # are excluded from the unit-coverage gate. Threshold ratchets UP only.
          go test ./internal/... -coverprofile=coverage-internal.out -covermode=atomic
          COV=$(go tool cover -func=coverage-internal.out | awk '/^total:/ {gsub(/%/,"",$3); print $3}')
          MIN=60.0
          echo "Internal package coverage: ${COV}% (minimum: ${MIN}%)"
          awk -v c="$COV" -v m="$MIN" 'BEGIN { if (c+0 < m+0) { printf "FAIL: coverage %.1f%% is below the %.1f%% gate\n", c+0, m+0; exit 1 } printf "PASS: coverage %.1f%% meets the %.1f%% gate\n", c+0, m+0 }'

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

  build:
    name: Build Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Lex Lambda
        run: |
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build \
            -ldflags="-s -w" \
            -o cmd/lex-lambda/bootstrap \
            ./cmd/lex-lambda/

      - name: Build Nova Sonic Lambda
        run: |
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build \
            -ldflags="-s -w" \
            -o cmd/nova-sonic-lambda/bootstrap \
            ./cmd/nova-sonic-lambda/

      - name: Verify binaries
        run: |
          file cmd/lex-lambda/bootstrap
          file cmd/nova-sonic-lambda/bootstrap

  validate-template:
    name: Validate SAM Template
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Validate template
        run: sam validate --template infrastructure/template.yaml --lint

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run Gosec
        uses: securego/gosec@master
        with:
          args: ./...

  validate-personas:
    name: Validate Personas
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate persona JSON files
        run: |
          for file in personas/*.json; do
            echo "Validating $file..."
            python3 -m json.tool "$file" > /dev/null || exit 1
          done

      - name: Check required personas
        run: |
          required="tangerine joseph jennifer"
          for persona in $required; do
            if [ ! -f "personas/${persona}.json" ]; then
              echo "Missing required persona: ${persona}"
              exit 1
            fi
          done
          echo "All required personas present"

  validate-contact-flows:
    name: Validate Contact Flows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate contact flow JSON
        run: |
          for file in infrastructure/contact-flow*.json; do
            echo "Validating $file..."
            python3 -m json.tool "$file" > /dev/null || exit 1
          done

  summary:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [lint, test, build, validate-template, security, validate-personas, validate-contact-flows]
    if: always()
    steps:
      - name: Generate summary from real job results
        env:
          R_LINT: ${{ needs.lint.result }}
          R_TEST: ${{ needs.test.result }}
          R_BUILD: ${{ needs.build.result }}
          R_TEMPLATE: ${{ needs.validate-template.result }}
          R_SECURITY: ${{ needs.security.result }}
          R_PERSONAS: ${{ needs.validate-personas.result }}
          R_FLOWS: ${{ needs.validate-contact-flows.result }}
        run: |
          icon() { [ "$1" = "success" ] && echo ":white_check_mark: $1" || echo ":x: $1"; }
          {
            echo "## PR Validation Summary"
            echo ""
            echo "| Check | Status |"
            echo "|-------|--------|"
            echo "| Lint & Format | $(icon "$R_LINT") |"
            echo "| Unit Tests + Coverage Gate | $(icon "$R_TEST") |"
            echo "| Build | $(icon "$R_BUILD") |"
            echo "| SAM Template | $(icon "$R_TEMPLATE") |"
            echo "| Security Scan | $(icon "$R_SECURITY") |"
            echo "| Personas | $(icon "$R_PERSONAS") |"
            echo "| Contact Flows | $(icon "$R_FLOWS") |"
          } >> $GITHUB_STEP_SUMMARY

          # Fail the summary (and the PR check) if any required job did not succeed.
          for r in "$R_LINT" "$R_TEST" "$R_BUILD" "$R_TEMPLATE" "$R_SECURITY" "$R_PERSONAS" "$R_FLOWS"; do
            if [ "$r" != "success" ]; then
              echo "::error::One or more validation jobs failed (see table above)."
              exit 1
            fi
          done
