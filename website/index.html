<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Headset Support — Test Chat</title>
  <style>
    :root { --bg:#0f172a; --panel:#1e293b; --accent:#f97316; --text:#e2e8f0; --muted:#94a3b8;
            --bot:#334155; --user:#f97316; --err:#7f1d1d; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
           background:var(--bg); color:var(--text); height:100vh; display:flex; }
    /* ---- Password gate ---- */
    #gate { margin:auto; background:var(--panel); padding:2rem; border-radius:12px;
            width:min(360px,90vw); box-shadow:0 10px 40px rgba(0,0,0,.4); }
    #gate h1 { font-size:1.25rem; margin:0 0 .25rem; }
    #gate p { color:var(--muted); margin:0 0 1.25rem; font-size:.9rem; }
    #gate label { display:block; font-size:.85rem; margin-bottom:.35rem; }
    #gate input { width:100%; padding:.7rem; border-radius:8px; border:1px solid #334155;
                  background:#0b1220; color:var(--text); font-size:1rem; }
    #gate button { width:100%; margin-top:1rem; padding:.7rem; border:0; border-radius:8px;
                   background:var(--accent); color:#0b1220; font-weight:600; font-size:1rem; cursor:pointer; }
    #gateErr { color:#fca5a5; font-size:.85rem; min-height:1.2em; margin-top:.5rem; }
    /* ---- Chat ---- */
    #app { display:none; flex-direction:column; width:min(680px,100vw); height:100vh; margin:0 auto;
           background:var(--panel); }
    header { padding:1rem 1.25rem; border-bottom:1px solid #334155; display:flex; align-items:center; gap:.6rem; }
    header .dot { width:10px; height:10px; border-radius:50%; background:#22c55e; }
    header h1 { font-size:1rem; margin:0; font-weight:600; }
    header .sub { color:var(--muted); font-size:.75rem; margin-left:auto; }
    #log { flex:1; overflow-y:auto; padding:1.25rem; display:flex; flex-direction:column; gap:.75rem; }
    .msg { max-width:80%; padding:.65rem .9rem; border-radius:14px; line-height:1.4; white-space:pre-wrap; word-wrap:break-word; }
    .msg.user { align-self:flex-end; background:var(--user); color:#0b1220; border-bottom-right-radius:4px; }
    .msg.bot  { align-self:flex-start; background:var(--bot); border-bottom-left-radius:4px; }
    .msg.err  { align-self:flex-start; background:var(--err); color:#fecaca; }
    .msg.sys  { align-self:center; background:transparent; color:var(--muted); font-size:.8rem; }
    form { display:flex; gap:.5rem; padding:1rem; border-top:1px solid #334155; }
    #input { flex:1; padding:.7rem .9rem; border-radius:10px; border:1px solid #334155;
             background:#0b1220; color:var(--text); font-size:1rem; }
    #send { padding:.7rem 1.1rem; border:0; border-radius:10px; background:var(--accent);
            color:#0b1220; font-weight:600; cursor:pointer; }
    #send:disabled { opacity:.5; cursor:default; }
  </style>
</head>
<body>
  <!-- Password gate. NOTE: this is a lightweight CLIENT-SIDE gate for a test
       front end only — it is NOT real authentication (the password ships in this
       page). Real API auth + CloudFront/OAC lockdown is WS-D-07/D-08 (SEC-5). -->
  <main id="gate">
    <h1>Headset Support — Test Chat</h1>
    <p>Enter the test password to continue.</p>
    <form id="gateForm">
      <label for="pw">Password</label>
      <input id="pw" type="password" autocomplete="off" autofocus />
      <button type="submit">Enter</button>
      <div id="gateErr" role="alert" aria-live="polite"></div>
    </form>
  </main>

  <section id="app" aria-label="Headset support chat">
    <header>
      <span class="dot" aria-hidden="true"></span>
      <h1>Headset Support Assistant</h1>
      <span class="sub">test environment</span>
    </header>
    <div id="log" aria-live="polite" aria-label="Conversation"></div>
    <form id="chatForm">
      <input id="input" type="text" placeholder="Describe your headset issue…"
             autocomplete="off" aria-label="Your message" />
      <button id="send" type="submit">Send</button>
    </form>
  </section>

  <script>
    // The deploy pipeline substitutes the real Chat API URL for this placeholder.
    var CHAT_API_URL = "__CHAT_API_URL__";
    var TEST_PASSWORD = "testing-me"; // documented in README.md (test-only soft gate)
    var sessionId = "web-" + Math.random().toString(36).slice(2) + "-" + Date.now();
    var sessionAttributes = {};

    var gate = document.getElementById("gate");
    var app = document.getElementById("app");
    var gateForm = document.getElementById("gateForm");
    var gateErr = document.getElementById("gateErr");
    var log = document.getElementById("log");
    var chatForm = document.getElementById("chatForm");
    var input = document.getElementById("input");
    var send = document.getElementById("send");

    gateForm.addEventListener("submit", function (e) {
      e.preventDefault();
      if (document.getElementById("pw").value === TEST_PASSWORD) {
        gate.style.display = "none";
        app.style.display = "flex";
        input.focus();
        addMsg("sys", "Connected. Ask me about a headset problem — e.g. “my headset has no sound”.");
      } else {
        gateErr.textContent = "Incorrect password.";
      }
    });

    function addMsg(cls, text) {
      var d = document.createElement("div");
      d.className = "msg " + cls;
      d.textContent = text;
      log.appendChild(d);
      log.scrollTop = log.scrollHeight;
      return d;
    }

    chatForm.addEventListener("submit", async function (e) {
      e.preventDefault();
      var text = input.value.trim();
      if (!text) return;
      addMsg("user", text);
      input.value = "";
      send.disabled = true;
      var thinking = addMsg("sys", "…");
      try {
        var res = await fetch(CHAT_API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            sessionId: sessionId,
            inputTranscript: text,
            sessionState: { sessionAttributes: sessionAttributes }
          })
        });
        var data = await res.json();
        thinking.remove();
        var msgs = (data && data.messages) || [];
        if (!msgs.length) { addMsg("err", "No response from the assistant."); }
        msgs.forEach(function (m) { addMsg("bot", m.content || ""); });
      } catch (err) {
        thinking.remove();
        addMsg("err", "Network error contacting the assistant: " + err.message);
      } finally {
        send.disabled = false;
        input.focus();
      }
    });
  </script>
</body>
</html>
