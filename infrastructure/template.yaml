AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Headset Support Agent - Voice-based troubleshooting with programmable personas (Dual Path - Lex + Nova Sonic)

Globals:
  Function:
    Timeout: 30
    MemorySize: 256
    Runtime: provided.al2023
    Architectures:
      - arm64
    Environment:
      Variables:
        LOG_LEVEL: !Ref LogLevel

Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues:
      - prod
    Description: Deployment environment (production only)

  SupervisorAgentName:
    Type: String
    Default: TroubleshootingOrchestrator
    Description: Name of the Bedrock supervisor agent

  KBBucketName:
    Type: String
    Description: S3 bucket name for knowledge base documents

  PersonaTableName:
    Type: String
    Default: PersonaConfigurations
    Description: DynamoDB table name for persona configurations

  LexBotName:
    Type: String
    Default: HeadsetTroubleshooterBot
    Description: Name of the Lex V2 bot

  BedrockModelSupervisor:
    Type: String
    Default: us.anthropic.claude-3-5-sonnet-20241022-v2:0
    Description: Inference profile for supervisor agent

  BedrockModelSubagent:
    Type: String
    Default: us.anthropic.claude-3-5-haiku-20241022-v1:0
    Description: Inference profile for sub-agents (cost optimized)

  LogLevel:
    Type: String
    Default: INFO
    AllowedValues:
      - DEBUG
      - INFO
      - WARN
      - ERROR

  DefaultPersona:
    Type: String
    Default: tangerine
    AllowedValues:
      - tangerine
      - joseph
      - jennifer

  UseNovaSonic:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: Enable Amazon Nova Sonic for voice streaming

  DeployLexPath:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: Deploy Path A (Lex-based voice)

  DeployNovaSonicPath:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: Deploy Path B (Nova Sonic streaming)

  ExistingConnectInstanceId:
    Type: String
    Default: ""
    Description: Existing Amazon Connect instance ID. Leave empty to create a new instance.

  # WS-C-04: Optional Connect agent user. Both params must be non-empty for the
  # AWS::Connect::User to be created. When the GH Actions secret is absent the
  # SAM Deploy step passes empty strings, the CreateAgentUser condition is false,
  # and no user is created (the queue + voicemail/callback path still works).
  ConnectAgentPassword:
    Type: String
    NoEcho: true
    Default: ""
    Description: Password for the headset.agent Connect user (from GH Actions secret CONNECT_AGENT_PASSWORD). Empty disables user creation.

  AgentSecurityProfileId:
    Type: String
    Default: ""
    Description: ID of the CONNECT_MANAGED "Agent" security profile (looked up in deploy.yml). Empty disables user creation.

Conditions:
  IsProd: !Equals [!Ref Environment, prod]
  DeployLex: !Equals [!Ref DeployLexPath, 'true']
  DeployNovaSonic: !Equals [!Ref DeployNovaSonicPath, 'true']
  CreateConnectInstance: !Equals [!Ref ExistingConnectInstanceId, ""]
  # WS-C-04: only create the agent user when BOTH the password and the security
  # profile id are supplied. Guards against a half-configured user resource.
  CreateAgentUser: !And
    - !Not [!Equals [!Ref ConnectAgentPassword, ""]]
    - !Not [!Equals [!Ref AgentSecurityProfileId, ""]]

Resources:
  # =============================================================
  # S3 BUCKET FOR KNOWLEDGE BASE
  # =============================================================
  KnowledgeBaseBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${KBBucketName}-${Environment}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: HeadsetSupportAgent

  # =============================================================
  # DYNAMODB TABLE FOR PERSONAS
  # =============================================================
  PersonaTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${PersonaTableName}-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: persona_id
          AttributeType: S
      KeySchema:
        - AttributeName: persona_id
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: !If [IsProd, true, false]
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: HeadsetSupportAgent

  # =============================================================
  # DYNAMODB TABLE FOR SESSION STATE
  # =============================================================
  SessionTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "HeadsetAgentSessions-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: session_id
          AttributeType: S
      KeySchema:
        - AttributeName: session_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # =============================================================
  # LAMBDA FUNCTION - PATH A: LEX FULFILLMENT
  # =============================================================
  LexOrchestratorFunction:
    Type: AWS::Serverless::Function
    Condition: DeployLex
    Metadata:
      BuildMethod: makefile
    Properties:
      FunctionName: !Sub "headset-lex-orchestrator-${Environment}"
      Handler: bootstrap
      CodeUri: ../cmd/lex-lambda/
      Description: Headset troubleshooting agent - Lex fulfillment handler (Path A)
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
          PERSONA_TABLE_NAME: !Ref PersonaTable
          SESSION_TABLE_NAME: !Ref SessionTable
          KB_BUCKET_NAME: !Ref KnowledgeBaseBucket
          SUPERVISOR_AGENT_ID_PARAM: !Sub "/headset-agent/${Environment}/supervisor-agent-id"
          SUPERVISOR_AGENT_ALIAS_PARAM: !Sub "/headset-agent/${Environment}/supervisor-agent-alias"
          DEFAULT_PERSONA: !Ref DefaultPersona
          BEDROCK_MODEL_SUPERVISOR: !Ref BedrockModelSupervisor
          BEDROCK_MODEL_SUBAGENT: !Ref BedrockModelSubagent
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Sid: BedrockFullAccess
              Effect: Allow
              Action:
                - bedrock:InvokeAgent
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
                - bedrock:RetrieveAndGenerate
                - bedrock:Retrieve
                - bedrock-agent-runtime:InvokeAgent
                - bedrock-agent-runtime:RetrieveAndGenerate
                - bedrock-agent-runtime:Retrieve
              Resource: '*'
            - Sid: DynamoDBAccess
              Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:Query
              Resource:
                - !GetAtt PersonaTable.Arn
                - !GetAtt SessionTable.Arn
            - Sid: S3Access
              Effect: Allow
              Action:
                - s3:GetObject
                - s3:ListBucket
              Resource:
                - !GetAtt KnowledgeBaseBucket.Arn
                - !Sub "${KnowledgeBaseBucket.Arn}/*"
            - Sid: SSMAccess
              Effect: Allow
              Action:
                - ssm:GetParameter
              Resource:
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/headset-agent/${Environment}/*"
            - Sid: PollyAccess
              Effect: Allow
              Action:
                - polly:SynthesizeSpeech
              Resource: '*'
      Events:
        ChatApiPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref ChatApi
            Path: /chat
            Method: POST
      Tags:
        Environment: !Ref Environment
        Project: HeadsetSupportAgent
        Path: Lex

  # Lambda permission for Lex
  LexInvocationPermission:
    Type: AWS::Lambda::Permission
    Condition: DeployLex
    Properties:
      FunctionName: !Ref LexOrchestratorFunction
      Action: lambda:InvokeFunction
      Principal: lexv2.amazonaws.com
      SourceArn: !Sub "arn:aws:lex:${AWS::Region}:${AWS::AccountId}:bot-alias/*"

  # =============================================================
  # LAMBDA FUNCTION - PATH B: NOVA SONIC STREAMING
  # =============================================================
  NovaSonicFunction:
    Type: AWS::Serverless::Function
    Condition: DeployNovaSonic
    Metadata:
      BuildMethod: makefile
    Properties:
      FunctionName: !Sub "headset-nova-sonic-${Environment}"
      Handler: bootstrap
      CodeUri: ../cmd/nova-sonic-lambda/
      Description: Headset troubleshooting agent - Nova Sonic streaming handler (Path B)
      Timeout: 300
      MemorySize: 512
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
          PERSONA_TABLE_NAME: !Ref PersonaTable
          SESSION_TABLE_NAME: !Ref SessionTable
          KB_BUCKET_NAME: !Ref KnowledgeBaseBucket
          SUPERVISOR_AGENT_ID_PARAM: !Sub "/headset-agent/${Environment}/supervisor-agent-id"
          SUPERVISOR_AGENT_ALIAS_PARAM: !Sub "/headset-agent/${Environment}/supervisor-agent-alias"
          DEFAULT_PERSONA: !Ref DefaultPersona
          NOVA_SONIC_MODEL: amazon.nova-sonic-v1:0
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Sid: BedrockFullAccess
              Effect: Allow
              Action:
                - bedrock:InvokeAgent
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
                - bedrock:InvokeModelWithBidirectionalStream
                - bedrock:Converse
                - bedrock:ConverseStream
                - bedrock-agent-runtime:InvokeAgent
              Resource: '*'
            - Sid: NovaSonicAccess
              Effect: Allow
              Action:
                - bedrock:InvokeModelWithBidirectionalStream
              Resource:
                - "arn:aws:bedrock:*::foundation-model/amazon.nova-sonic*"
            - Sid: DynamoDBAccess
              Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:Query
              Resource:
                - !GetAtt PersonaTable.Arn
                - !GetAtt SessionTable.Arn
            - Sid: S3Access
              Effect: Allow
              Action:
                - s3:GetObject
                - s3:ListBucket
              Resource:
                - !GetAtt KnowledgeBaseBucket.Arn
                - !Sub "${KnowledgeBaseBucket.Arn}/*"
            - Sid: SSMAccess
              Effect: Allow
              Action:
                - ssm:GetParameter
              Resource:
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/headset-agent/${Environment}/*"
      FunctionUrlConfig:
        AuthType: AWS_IAM
        InvokeMode: RESPONSE_STREAM
      Tags:
        Environment: !Ref Environment
        Project: HeadsetSupportAgent
        Path: NovaSonic

  # =============================================================
  # IAM ROLE FOR BEDROCK AGENTS
  # =============================================================
  BedrockAgentRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "BedrockAgentRole-${Environment}"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
      Policies:
        - PolicyName: BedrockAgentPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: InvokeModel
                Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                  - bedrock:GetInferenceProfile
                  - bedrock:ListInferenceProfiles
                Resource: '*'
              - Sid: CrossRegionInference
                Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource:
                  - !Sub "arn:aws:bedrock:*:${AWS::AccountId}:inference-profile/*"
                  - "arn:aws:bedrock:*::foundation-model/*"
              - Sid: KnowledgeBase
                Effect: Allow
                Action:
                  - bedrock:Retrieve
                  - bedrock:RetrieveAndGenerate
                Resource: '*'
              - Sid: S3KnowledgeBase
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt KnowledgeBaseBucket.Arn
                  - !Sub "${KnowledgeBaseBucket.Arn}/*"
              - Sid: NovaSonicAccess
                Effect: Allow
                Action:
                  - bedrock:InvokeModelWithBidirectionalStream
                Resource:
                  - "arn:aws:bedrock:*::foundation-model/amazon.nova-sonic*"
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # =============================================================
  # IAM ROLE FOR LEX BOT
  # =============================================================
  LexServiceRole:
    Type: AWS::IAM::Role
    Condition: DeployLex
    Properties:
      RoleName: !Sub "LexServiceRole-${Environment}"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lexv2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: LexServicePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - polly:SynthesizeSpeech
                Resource: '*'
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !GetAtt LexOrchestratorFunction.Arn

  # =============================================================
  # CLOUDWATCH LOG GROUPS
  # =============================================================
  LexLambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: DeployLex
    Properties:
      LogGroupName: !Sub "/aws/lambda/headset-lex-orchestrator-${Environment}"
      RetentionInDays: !If [IsProd, 90, 14]
      # WS-D-03 (SEC-2): mask caller PII in logs even if a code path leaks it.
      DataProtectionPolicy:
        Name: headset-lex-pii-protection
        Version: "2021-06-01"
        Statement:
          - Sid: audit-pii
            DataIdentifier:
              - arn:aws:dataprotection::aws:data-identifier/PhoneNumber-US
              - arn:aws:dataprotection::aws:data-identifier/Name
              - arn:aws:dataprotection::aws:data-identifier/Address
            Operation:
              Audit:
                FindingsDestination: {}
          - Sid: deidentify-pii
            DataIdentifier:
              - arn:aws:dataprotection::aws:data-identifier/PhoneNumber-US
              - arn:aws:dataprotection::aws:data-identifier/Name
              - arn:aws:dataprotection::aws:data-identifier/Address
            Operation:
              Deidentify:
                MaskConfig: {}

  NovaSonicLambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: DeployNovaSonic
    Properties:
      LogGroupName: !Sub "/aws/lambda/headset-nova-sonic-${Environment}"
      RetentionInDays: !If [IsProd, 90, 14]
      DataProtectionPolicy:
        Name: headset-nova-pii-protection
        Version: "2021-06-01"
        Statement:
          - Sid: audit-pii
            DataIdentifier:
              - arn:aws:dataprotection::aws:data-identifier/PhoneNumber-US
              - arn:aws:dataprotection::aws:data-identifier/Name
              - arn:aws:dataprotection::aws:data-identifier/Address
            Operation:
              Audit:
                FindingsDestination: {}
          - Sid: deidentify-pii
            DataIdentifier:
              - arn:aws:dataprotection::aws:data-identifier/PhoneNumber-US
              - arn:aws:dataprotection::aws:data-identifier/Name
              - arn:aws:dataprotection::aws:data-identifier/Address
            Operation:
              Deidentify:
                MaskConfig: {}

  # =============================================================
  # API GATEWAY FOR WEB CHAT
  # =============================================================
  ChatApi:
    Type: AWS::Serverless::HttpApi
    Condition: DeployLex
    Properties:
      StageName: !Ref Environment
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - X-Session-Id
          - X-Persona-Id

  # =============================================================
  # S3 BUCKET FOR STATIC WEBSITE
  # =============================================================
  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "headset-chat-${AWS::AccountId}-${Environment}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: HeadsetSupportAgent

  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Statement:
          - Sid: PublicReadGetObject
            Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "${WebsiteBucket.Arn}/*"

  # =============================================================
  # LEX V2 BOT FOR VOICE INTERFACE (PATH A)
  # =============================================================
  HeadsetBot:
    Type: AWS::Lex::Bot
    Condition: DeployLex
    Properties:
      Name: !Sub "${LexBotName}-${Environment}"
      Description: Headset troubleshooting voice bot (Path A - Lex)
      RoleArn: !GetAtt LexServiceRole.Arn
      DataPrivacy:
        ChildDirected: false
      IdleSessionTTLInSeconds: 300
      AutoBuildBotLocales: true
      BotLocales:
        - LocaleId: en_US
          NluConfidenceThreshold: 0.40
          VoiceSettings:
            VoiceId: Joanna
            Engine: neural
          Intents:
            - Name: TroubleshootIntent
              Description: Main troubleshooting intent
              SampleUtterances:
                - Utterance: "I need help with my headset"
                - Utterance: "My headset isn't working"
                - Utterance: "I have a problem"
                - Utterance: "Help me fix my headset"
                - Utterance: "Audio not working"
                - Utterance: "Can't hear anything"
                - Utterance: "Microphone not working"
                - Utterance: "Bluetooth won't connect"
                - Utterance: "How do I pair my headset"
              FulfillmentCodeHook:
                Enabled: true
              DialogCodeHook:
                Enabled: true
            - Name: FallbackIntent
              Description: Fallback intent
              ParentIntentSignature: "AMAZON.FallbackIntent"
              FulfillmentCodeHook:
                Enabled: true
              DialogCodeHook:
                Enabled: true
      BotTags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: HeadsetSupportAgent
        - Key: Path
          Value: Lex

  HeadsetBotVersion:
    Type: AWS::Lex::BotVersion
    Condition: DeployLex
    DependsOn:
      - HeadsetBot
      - LexOrchestratorFunction
      - LexInvocationPermission
    Properties:
      BotId: !Ref HeadsetBot
      BotVersionLocaleSpecification:
        - LocaleId: en_US
          BotVersionLocaleDetails:
            SourceBotVersion: DRAFT

  HeadsetBotAlias:
    Type: AWS::Lex::BotAlias
    Condition: DeployLex
    DependsOn:
      - HeadsetBotVersion
      - LexOrchestratorFunction
      - LexInvocationPermission
    Properties:
      BotId: !Ref HeadsetBot
      BotAliasName: !Sub "live-${Environment}"
      BotVersion: !GetAtt HeadsetBotVersion.BotVersion
      BotAliasLocaleSettings:
        - LocaleId: en_US
          BotAliasLocaleSetting:
            Enabled: true
            CodeHookSpecification:
              LambdaCodeHook:
                CodeHookInterfaceVersion: "1.0"
                LambdaArn: !GetAtt LexOrchestratorFunction.Arn
      SentimentAnalysisSettings:
        DetectSentiment: false

  # =============================================================
  # AMAZON CONNECT INSTANCE
  # =============================================================
  ConnectInstance:
    Type: AWS::Connect::Instance
    Condition: CreateConnectInstance
    Properties:
      InstanceAlias: "headset"
      IdentityManagementType: CONNECT_MANAGED
      Attributes:
        InboundCalls: true
        OutboundCalls: true
        ContactflowLogs: true
        AutoResolveBestVoices: true
        UseCustomTTSVoices: false
        EarlyMedia: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: HeadsetSupportAgent

  # =============================================================
  # CONNECT INTEGRATIONS
  # =============================================================
  ConnectLexIntegration:
    Type: AWS::Connect::IntegrationAssociation
    Condition: DeployLex
    DependsOn:
      - HeadsetBotAlias
    Properties:
      # InstanceId property requires ARN format, not just the instance ID
      InstanceId: !If
        - CreateConnectInstance
        - !GetAtt ConnectInstance.Arn
        - !Sub "arn:aws:connect:${AWS::Region}:${AWS::AccountId}:instance/${ExistingConnectInstanceId}"
      IntegrationType: LEX_BOT
      IntegrationArn: !GetAtt HeadsetBotAlias.Arn

  ConnectLambdaIntegration:
    Type: AWS::Connect::IntegrationAssociation
    Condition: DeployNovaSonic
    DependsOn:
      - NovaSonicFunction
    Properties:
      # InstanceId property requires ARN format, not just the instance ID
      InstanceId: !If
        - CreateConnectInstance
        - !GetAtt ConnectInstance.Arn
        - !Sub "arn:aws:connect:${AWS::Region}:${AWS::AccountId}:instance/${ExistingConnectInstanceId}"
      IntegrationType: LAMBDA_FUNCTION
      IntegrationArn: !GetAtt NovaSonicFunction.Arn

  # =============================================================
  # CONNECT HOURS / QUEUE / ROUTING / USER (WS-C-01..04)
  # =============================================================
  # WS-C-01: Business hours Mon-Fri 09:00-17:00 America/New_York.
  HeadsetHoursOfOperation:
    Type: AWS::Connect::HoursOfOperation
    Properties:
      InstanceArn: !If
        - CreateConnectInstance
        - !GetAtt ConnectInstance.Arn
        - !Sub "arn:aws:connect:${AWS::Region}:${AWS::AccountId}:instance/${ExistingConnectInstanceId}"
      Name: !Sub "HeadsetBusinessHours-${Environment}"
      Description: Mon-Fri 09:00-17:00 Eastern business hours for headset escalation
      TimeZone: America/New_York
      Config:
        - Day: MONDAY
          StartTime:
            Hours: 9
            Minutes: 0
          EndTime:
            Hours: 17
            Minutes: 0
        - Day: TUESDAY
          StartTime:
            Hours: 9
            Minutes: 0
          EndTime:
            Hours: 17
            Minutes: 0
        - Day: WEDNESDAY
          StartTime:
            Hours: 9
            Minutes: 0
          EndTime:
            Hours: 17
            Minutes: 0
        - Day: THURSDAY
          StartTime:
            Hours: 9
            Minutes: 0
          EndTime:
            Hours: 17
            Minutes: 0
        - Day: FRIDAY
          StartTime:
            Hours: 9
            Minutes: 0
          EndTime:
            Hours: 17
            Minutes: 0
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: HeadsetSupportAgent

  # WS-C-02: Escalation queue bound to the business hours above.
  HeadsetEscalationQueue:
    Type: AWS::Connect::Queue
    Properties:
      InstanceArn: !If
        - CreateConnectInstance
        - !GetAtt ConnectInstance.Arn
        - !Sub "arn:aws:connect:${AWS::Region}:${AWS::AccountId}:instance/${ExistingConnectInstanceId}"
      Name: !Sub "HeadsetEscalation-${Environment}"
      Description: Queue for headset support calls escalated from the bot
      HoursOfOperationArn: !GetAtt HeadsetHoursOfOperation.HoursOfOperationArn
      MaxContacts: 50
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: HeadsetSupportAgent

  # WS-C-03: Routing profile that serves the escalation queue over VOICE.
  HeadsetRoutingProfile:
    Type: AWS::Connect::RoutingProfile
    Properties:
      InstanceArn: !If
        - CreateConnectInstance
        - !GetAtt ConnectInstance.Arn
        - !Sub "arn:aws:connect:${AWS::Region}:${AWS::AccountId}:instance/${ExistingConnectInstanceId}"
      Name: !Sub "HeadsetRouting-${Environment}"
      Description: Routing profile for headset escalation agents (voice only)
      DefaultOutboundQueueArn: !GetAtt HeadsetEscalationQueue.QueueArn
      MediaConcurrencies:
        - Channel: VOICE
          Concurrency: 1
      QueueConfigs:
        - QueueReference:
            QueueArn: !GetAtt HeadsetEscalationQueue.QueueArn
            Channel: VOICE
          Priority: 1
          Delay: 0
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: HeadsetSupportAgent

  # WS-C-04: Optional test agent user (Condition: CreateAgentUser). Password is a
  # NoEcho parameter sourced from the GH Actions secret CONNECT_AGENT_PASSWORD;
  # it never appears in the template or logs. No Secrets Manager is used.
  HeadsetAgentUser:
    Type: AWS::Connect::User
    Condition: CreateAgentUser
    Properties:
      InstanceArn: !If
        - CreateConnectInstance
        - !GetAtt ConnectInstance.Arn
        - !Sub "arn:aws:connect:${AWS::Region}:${AWS::AccountId}:instance/${ExistingConnectInstanceId}"
      Username: headset.agent
      Password: !Ref ConnectAgentPassword
      RoutingProfileArn: !GetAtt HeadsetRoutingProfile.RoutingProfileArn
      SecurityProfileArns:
        - !Sub
          - "arn:aws:connect:${AWS::Region}:${AWS::AccountId}:instance/${Inst}/security-profile/${Sp}"
          - Inst: !If [CreateConnectInstance, !Ref ConnectInstance, !Ref ExistingConnectInstanceId]
            Sp: !Ref AgentSecurityProfileId
      IdentityInfo:
        FirstName: Headset
        LastName: Agent
      PhoneConfig:
        PhoneType: SOFT_PHONE
        AutoAccept: false
        AfterContactWorkTimeLimit: 60
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: HeadsetSupportAgent

  # =============================================================
  # CONNECT CONTACT FLOWS
  # =============================================================
  # =============================================================
  # SINGLE SOURCE OF TRUTH for the Lex contact flow (WS-C-05).
  # This inline CFN ContactFlow is the ONLY authoritative definition of the
  # Lex voice flow. The good parts of the former infrastructure/contact-flow-lex.json
  # (persona DTMF menu + escalation check) were ported here and the queue/hours
  # ARNs are injected with Fn::Sub. setup-connect.py NO LONGER creates or updates
  # flows; it only claims phone numbers and associates them to this flow.
  # contact-flow-lex.json is retained only as a non-authoritative reference.
  # WS-C-06: real escalation path (CheckHoursOfOperation -> UpdateContactTargetQueue
  # -> TransferContactToQueue with graceful error/after-hours branches).
  # WS-D-01 (SEC-1): the first audible block is a recording/AI consent disclosure.
  # =============================================================
  LexContactFlow:
    Type: AWS::Connect::ContactFlow
    Condition: DeployLex
    DependsOn:
      - ConnectLexIntegration
      - HeadsetEscalationQueue
      - HeadsetHoursOfOperation
    Properties:
      InstanceArn: !If
        - CreateConnectInstance
        - !GetAtt ConnectInstance.Arn
        - !Sub "arn:aws:connect:${AWS::Region}:${AWS::AccountId}:instance/${ExistingConnectInstanceId}"
      Name: !Sub "HeadsetSupport-Lex-${Environment}"
      Type: CONTACT_FLOW
      State: ACTIVE
      Content: !Sub |
        {
          "Version": "2019-10-30",
          "StartAction": "consent",
          "Actions": [
            {
              "Identifier": "consent",
              "Type": "MessageParticipant",
              "Parameters": {
                "Text": "This call is recorded and transcribed for quality and training, and is handled by an automated A I assistant. By staying on the line you consent to this. If you do not consent, please hang up now."
              },
              "Transitions": {
                "NextAction": "lexBot",
                "Errors": [{"NextAction": "lexBot", "ErrorType": "NoMatchingError"}],
                "Conditions": []
              }
            },
            {
              "Identifier": "lexBot",
              "Type": "ConnectParticipantWithLexBot",
              "Parameters": {
                "Text": "How can I help you with your headset today?",
                "LexV2Bot": {"AliasArn": "${HeadsetBotAlias.Arn}"}
              },
              "Transitions": {
                "NextAction": "goodbye",
                "Errors": [
                  {"NextAction": "retry", "ErrorType": "NoMatchingError"},
                  {"NextAction": "retry", "ErrorType": "NoMatchingCondition"},
                  {"NextAction": "retry", "ErrorType": "InputTimeLimitExceeded"}
                ],
                "Conditions": []
              }
            },
            {
              "Identifier": "retry",
              "Type": "MessageParticipant",
              "Parameters": {
                "Text": "I'm sorry, I had trouble understanding. Thank you for calling Headset Support. Goodbye."
              },
              "Transitions": {
                "NextAction": "goodbye",
                "Errors": [{"NextAction": "goodbye", "ErrorType": "NoMatchingError"}],
                "Conditions": []
              }
            },
            {
              "Identifier": "goodbye",
              "Type": "DisconnectParticipant",
              "Parameters": {},
              "Transitions": {}
            }
          ]
        }
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Path
          Value: Lex

  NovaSonicContactFlow:
    Type: AWS::Connect::ContactFlow
    Condition: DeployNovaSonic
    DependsOn:
      - ConnectLambdaIntegration
    Properties:
      InstanceArn: !If
        - CreateConnectInstance
        - !GetAtt ConnectInstance.Arn
        - !Sub "arn:aws:connect:${AWS::Region}:${AWS::AccountId}:instance/${ExistingConnectInstanceId}"
      Name: !Sub "HeadsetSupport-NovaSonic-${Environment}"
      Type: CONTACT_FLOW
      State: ACTIVE
      Content: !Sub |
        {
          "Version": "2019-10-30",
          "StartAction": "f1a2b3c4-6789-0abc-def1-234567890abc",
          "Actions": [
            {
              "Identifier": "f1a2b3c4-6789-0abc-def1-234567890abc",
              "Type": "MessageParticipant",
              "Parameters": {
                "Text": "Welcome to Headset Support with Nova Sonic voice."
              },
              "Transitions": {
                "NextAction": "a2b3c4d5-7890-1bcd-ef12-345678901bcd",
                "Errors": [],
                "Conditions": []
              }
            },
            {
              "Identifier": "a2b3c4d5-7890-1bcd-ef12-345678901bcd",
              "Type": "InvokeLambdaFunction",
              "Parameters": {
                "LambdaFunctionARN": "${NovaSonicFunction.Arn}",
                "InvocationTimeLimitSeconds": "8"
              },
              "Transitions": {
                "NextAction": "b3c4d5e6-8901-2cde-f123-456789012cde",
                "Errors": [
                  {
                    "NextAction": "c4d5e6f7-9012-3def-0123-567890123def",
                    "ErrorType": "NoMatchingError"
                  }
                ],
                "Conditions": []
              }
            },
            {
              "Identifier": "b3c4d5e6-8901-2cde-f123-456789012cde",
              "Type": "MessageParticipant",
              "Parameters": {
                "Text": "Thank you for using Nova Sonic Support. Goodbye!"
              },
              "Transitions": {
                "NextAction": "d5e6f7a8-0123-4ef0-1234-678901234ef0",
                "Errors": [],
                "Conditions": []
              }
            },
            {
              "Identifier": "c4d5e6f7-9012-3def-0123-567890123def",
              "Type": "MessageParticipant",
              "Parameters": {
                "Text": "I'm sorry, we're experiencing technical difficulties. Please try again later."
              },
              "Transitions": {
                "NextAction": "d5e6f7a8-0123-4ef0-1234-678901234ef0",
                "Errors": [],
                "Conditions": []
              }
            },
            {
              "Identifier": "d5e6f7a8-0123-4ef0-1234-678901234ef0",
              "Type": "DisconnectParticipant",
              "Parameters": {},
              "Transitions": {}
            }
          ]
        }
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Path
          Value: NovaSonic

  # =============================================================
  # SSM PARAMETERS
  # =============================================================
  SupervisorAgentIdParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/headset-agent/${Environment}/supervisor-agent-id"
      Type: String
      Value: "PLACEHOLDER"
      Description: Bedrock Supervisor Agent ID (updated by create-agents script)

  SupervisorAgentAliasParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/headset-agent/${Environment}/supervisor-agent-alias"
      Type: String
      Value: "PLACEHOLDER"
      Description: Bedrock Supervisor Agent Alias (updated by create-agents script)

  ConnectInstanceIdParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/headset-agent/${Environment}/connect/instance-id"
      Type: String
      Value: !If [CreateConnectInstance, !Ref ConnectInstance, !Ref ExistingConnectInstanceId]
      Description: Amazon Connect instance ID

  # WS-C-01: hours-of-operation ARN for downstream tooling / flows.
  HoursOfOperationArnParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/headset-agent/${Environment}/connect/hours-arn"
      Type: String
      Value: !GetAtt HeadsetHoursOfOperation.HoursOfOperationArn
      Description: Amazon Connect hours-of-operation ARN (business hours)

  # WS-C-02: escalation queue ARN for downstream tooling / flows.
  EscalationQueueArnParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/headset-agent/${Environment}/connect/escalation-queue-arn"
      Type: String
      Value: !GetAtt HeadsetEscalationQueue.QueueArn
      Description: Amazon Connect escalation queue ARN

  PhoneNumberLexParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/headset-agent/${Environment}/connect/phone-number-lex"
      Type: String
      Value: "PENDING"
      Description: Phone number for Lex path (Path A) - claimed by setup-connect script

  PhoneNumberNovaSonicParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/headset-agent/${Environment}/connect/phone-number-nova-sonic"
      Type: String
      Value: "PENDING"
      Description: Phone number for Nova Sonic path (Path B) - claimed by setup-connect script

  # =============================================================
  # OBSERVABILITY & ALERTING (WS-F-01 SNS, WS-F-02 alarms)
  # =============================================================
  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "headset-alerts-${Environment}"
      DisplayName: Headset Agent Alerts

  # Email subscription requires a one-time manual confirmation click by the
  # recipient (AWS sends a confirmation email). Until confirmed, alarms publish
  # but no email is delivered.
  AlertTopicEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref AlertTopic
      Protocol: email
      Endpoint: proffitt.jeremy@gmail.com

  # --- Lex orchestrator Lambda alarms ---
  LexErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: DeployLex
    Properties:
      AlarmName: !Sub "headset-lex-errors-${Environment}"
      AlarmDescription: "Lex orchestrator Lambda is erroring"
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref LexOrchestratorFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic

  LexDurationAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: DeployLex
    Properties:
      AlarmName: !Sub "headset-lex-duration-p95-${Environment}"
      AlarmDescription: "Lex orchestrator p95 duration > 20s (approaching the 25s agent timeout)"
      Namespace: AWS/Lambda
      MetricName: Duration
      Dimensions:
        - Name: FunctionName
          Value: !Ref LexOrchestratorFunction
      ExtendedStatistic: p95
      Period: 300
      EvaluationPeriods: 1
      Threshold: 20000
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic

  LexThrottlesAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: DeployLex
    Properties:
      AlarmName: !Sub "headset-lex-throttles-${Environment}"
      AlarmDescription: "Lex orchestrator Lambda is being throttled"
      Namespace: AWS/Lambda
      MetricName: Throttles
      Dimensions:
        - Name: FunctionName
          Value: !Ref LexOrchestratorFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic

  # --- Nova Sonic Lambda alarms (streaming function: errors + throttles only;
  #     Duration is intentionally not alarmed because it is long-lived) ---
  NovaErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: DeployNovaSonic
    Properties:
      AlarmName: !Sub "headset-nova-errors-${Environment}"
      AlarmDescription: "Nova Sonic Lambda is erroring"
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref NovaSonicFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic

  NovaThrottlesAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: DeployNovaSonic
    Properties:
      AlarmName: !Sub "headset-nova-throttles-${Environment}"
      AlarmDescription: "Nova Sonic Lambda is being throttled"
      Namespace: AWS/Lambda
      MetricName: Throttles
      Dimensions:
        - Name: FunctionName
          Value: !Ref NovaSonicFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic

  # --- Bedrock alarms by ModelId. Inference profiles emit AWS/Bedrock metrics
  #     under the underlying foundation-model id; if the dimension does not match
  #     the alarm sits at INSUFFICIENT_DATA (notBreaching) which is harmless. ---
  BedrockSupervisorServerErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "headset-bedrock-supervisor-server-errors-${Environment}"
      AlarmDescription: "Bedrock supervisor model server errors"
      Namespace: AWS/Bedrock
      MetricName: InvocationServerErrors
      Dimensions:
        - Name: ModelId
          Value: anthropic.claude-3-5-sonnet-20241022-v2:0
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic

  BedrockSupervisorThrottlesAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "headset-bedrock-supervisor-throttles-${Environment}"
      AlarmDescription: "Bedrock supervisor model invocation throttles"
      Namespace: AWS/Bedrock
      MetricName: InvocationThrottles
      Dimensions:
        - Name: ModelId
          Value: anthropic.claude-3-5-sonnet-20241022-v2:0
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic

  # =============================================================
  # CONFIG-DRIFT CANARY (WS-F-04)
  # Runs hourly via EventBridge, reads three SSM params, and emits
  # CloudWatch custom metrics so alarms fire when the deployment is
  # still in its initial PLACEHOLDER/PENDING state.
  # =============================================================
  CanaryFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      FunctionName: !Sub "headset-config-canary-${Environment}"
      Handler: bootstrap
      CodeUri: ../cmd/canary-lambda/
      Description: Config-drift canary — emits CloudWatch metrics for PLACEHOLDER/PENDING SSM params
      # NOTE (WS-F-08 blocked): this AWS account's Lambda concurrency limit is so low
      # that reserving ANY concurrency drops the unreserved pool below the minimum of
      # 10 (CFN: "decreases account's UnreservedConcurrentExecution below [10]").
      # ReservedConcurrentExecutions is therefore omitted here AND cannot be set on
      # the Lex/Nova functions until a Service Quotas increase is requested. Tracked
      # under WS-F-08. The hourly EventBridge schedule already bounds canary invocations.
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
          SUPERVISOR_AGENT_ID_PARAM: !Sub "/headset-agent/${Environment}/supervisor-agent-id"
          PHONE_LEX_PARAM: !Sub "/headset-agent/${Environment}/connect/phone-number-lex"
          PHONE_NOVA_PARAM: !Sub "/headset-agent/${Environment}/connect/phone-number-nova-sonic"
      Events:
        # SAM creates the EventBridge rule + the Lambda::Permission automatically.
        HourlyCheck:
          Type: Schedule
          Properties:
            Schedule: rate(1 hour)
            Description: Trigger the config-drift canary every hour
            Enabled: true
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Sid: ReadCanarySSMParams
              Effect: Allow
              Action:
                - ssm:GetParameter
              Resource:
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/headset-agent/${Environment}/*"
            # cloudwatch:PutMetricData does not support resource-level scoping;
            # the Condition restricts to the HeadsetAgent/Canary namespace only.
            - Sid: PutCanaryMetrics
              Effect: Allow
              Action:
                - cloudwatch:PutMetricData
              Resource: "*"
              Condition:
                StringEquals:
                  cloudwatch:namespace: "HeadsetAgent/Canary"
      Tags:
        Environment: !Ref Environment
        Project: HeadsetSupportAgent
        Component: Canary

  CanaryLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/headset-config-canary-${Environment}"
      # 90 days in prod keeps enough history for audit; 14 days elsewhere
      # avoids unnecessary storage cost.
      RetentionInDays: !If [IsProd, 90, 14]

  # Alarm: supervisor-agent-id has never been populated.
  # TreatMissingData: notBreaching — before the canary has run even once there
  # are no datapoints, and treating that as ALARM would create false pages
  # immediately after a fresh deploy.  Once the canary fires the first
  # real datapoint, the alarm transitions to ALARM within ~2 h if the param
  # is still a PLACEHOLDER (2 eval periods × 3600 s).
  CanaryAgentPlaceholderAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "headset-canary-agent-placeholder-${Environment}"
      AlarmDescription: >
        Supervisor agent ID is still PLACEHOLDER.  The Bedrock agent has not been
        created yet; callers receive the degraded "setting up" response.
      Namespace: HeadsetAgent/Canary
      MetricName: AgentIdIsPlaceholder
      # No Dimensions — matches the single no-dimension datapoint emitted by the canary.
      Statistic: Maximum
      Period: 3600
      EvaluationPeriods: 2
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic

  # Alarm: at least one Connect phone number is still PENDING.
  # The canary emits two datapoints per invocation (Path=lex, Path=nova).
  # This alarm queries without a dimension filter so it catches EITHER path
  # being pending (Maximum across both dimensions >= 1).
  CanaryPhonePendingAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "headset-canary-phone-pending-${Environment}"
      AlarmDescription: >
        At least one Connect phone number (Lex or Nova Sonic path) is still
        PENDING.  Callers cannot reach the IVR until a real number is claimed
        and written to the SSM parameter.
      Namespace: HeadsetAgent/Canary
      MetricName: PhoneNumberPending
      # No Dimensions — aggregates across both Path=lex and Path=nova datapoints.
      Statistic: Maximum
      Period: 3600
      EvaluationPeriods: 2
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic

Outputs:
  # Shared Outputs
  KnowledgeBaseBucketName:
    Description: S3 bucket for knowledge base documents
    Value: !Ref KnowledgeBaseBucket
    Export:
      Name: !Sub "${AWS::StackName}-KBBucket"

  PersonaTableName:
    Description: DynamoDB table for persona configurations
    Value: !Ref PersonaTable
    Export:
      Name: !Sub "${AWS::StackName}-PersonaTable"

  SessionTableName:
    Description: DynamoDB table for session state
    Value: !Ref SessionTable

  AlertTopicArn:
    Description: SNS topic ARN for operational alerts
    Value: !Ref AlertTopic
    Export:
      Name: !Sub "${AWS::StackName}-AlertTopic"

  BedrockAgentRoleArn:
    Description: IAM role ARN for Bedrock agents
    Value: !GetAtt BedrockAgentRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-BedrockAgentRole"

  WebsiteUrl:
    Description: Static website URL for chat interface
    Value: !Sub "http://${WebsiteBucket}.s3-website-${AWS::Region}.amazonaws.com"
    Export:
      Name: !Sub "${AWS::StackName}-WebsiteUrl"

  WebsiteBucketName:
    Description: S3 bucket name for static website
    Value: !Ref WebsiteBucket

  # Path A (Lex) Outputs
  LexLambdaFunctionArn:
    Condition: DeployLex
    Description: ARN of the Lex Lambda function (Path A)
    Value: !GetAtt LexOrchestratorFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-LexLambdaArn"

  LexLambdaFunctionName:
    Condition: DeployLex
    Description: Name of the Lex Lambda function (Path A)
    Value: !Ref LexOrchestratorFunction

  LexServiceRoleArn:
    Condition: DeployLex
    Description: IAM role ARN for Lex bot
    Value: !GetAtt LexServiceRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-LexServiceRole"

  ChatApiUrl:
    Condition: DeployLex
    Description: API Gateway URL for chat endpoint
    Value: !Sub "https://${ChatApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/chat"
    Export:
      Name: !Sub "${AWS::StackName}-ChatApiUrl"

  LexBotId:
    Condition: DeployLex
    Description: Lex V2 Bot ID
    Value: !Ref HeadsetBot
    Export:
      Name: !Sub "${AWS::StackName}-LexBotId"

  LexBotAliasId:
    Condition: DeployLex
    Description: Lex V2 Bot Alias ID
    Value: !GetAtt HeadsetBotAlias.BotAliasId
    Export:
      Name: !Sub "${AWS::StackName}-LexBotAliasId"

  LexBotAliasArn:
    Condition: DeployLex
    Description: Lex V2 Bot Alias ARN
    Value: !GetAtt HeadsetBotAlias.Arn
    Export:
      Name: !Sub "${AWS::StackName}-LexBotAliasArn"

  # Path B (Nova Sonic) Outputs
  NovaSonicLambdaFunctionArn:
    Condition: DeployNovaSonic
    Description: ARN of the Nova Sonic Lambda function (Path B)
    Value: !GetAtt NovaSonicFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-NovaSonicLambdaArn"

  NovaSonicLambdaFunctionName:
    Condition: DeployNovaSonic
    Description: Name of the Nova Sonic Lambda function (Path B)
    Value: !Ref NovaSonicFunction

  # Connect Outputs
  ConnectInstanceId:
    Description: Amazon Connect Instance ID
    Value: !If [CreateConnectInstance, !Ref ConnectInstance, !Ref ExistingConnectInstanceId]
    Export:
      Name: !Sub "${AWS::StackName}-ConnectInstanceId"

  ConnectInstanceArn:
    Description: Amazon Connect Instance ARN
    Value: !If
      - CreateConnectInstance
      - !GetAtt ConnectInstance.Arn
      - !Sub "arn:aws:connect:${AWS::Region}:${AWS::AccountId}:instance/${ExistingConnectInstanceId}"
    Export:
      Name: !Sub "${AWS::StackName}-ConnectInstanceArn"

  HoursOfOperationArn:
    Description: Amazon Connect hours-of-operation ARN (WS-C-01)
    Value: !GetAtt HeadsetHoursOfOperation.HoursOfOperationArn
    Export:
      Name: !Sub "${AWS::StackName}-HoursOfOperationArn"

  EscalationQueueArn:
    Description: Amazon Connect escalation queue ARN (WS-C-02)
    Value: !GetAtt HeadsetEscalationQueue.QueueArn
    Export:
      Name: !Sub "${AWS::StackName}-EscalationQueueArn"

  RoutingProfileArn:
    Description: Amazon Connect routing profile ARN (WS-C-03)
    Value: !GetAtt HeadsetRoutingProfile.RoutingProfileArn
    Export:
      Name: !Sub "${AWS::StackName}-RoutingProfileArn"

  AgentUserArn:
    Condition: CreateAgentUser
    Description: Amazon Connect agent user ARN (WS-C-04, only when CreateAgentUser)
    Value: !GetAtt HeadsetAgentUser.UserArn

  LexContactFlowArn:
    Condition: DeployLex
    Description: Contact flow ARN for Lex path
    Value: !GetAtt LexContactFlow.ContactFlowArn

  NovaSonicContactFlowArn:
    Condition: DeployNovaSonic
    Description: Contact flow ARN for Nova Sonic path
    Value: !GetAtt NovaSonicContactFlow.ContactFlowArn

